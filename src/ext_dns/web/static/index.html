<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>docker-ext-dns</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --orange: #f97316;
    --grey: #475569;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 span { color: var(--accent); }

  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: var(--border); }

  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }

  .tab {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    transition: color 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .led {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--grey); display: inline-block; flex-shrink: 0;
  }
  .tab .led.ok  { background: var(--green); }
  .tab .led.err { background: var(--red); }

  main { padding: 20px; }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 13px;
  }

  .count { color: var(--text-muted); font-size: 13px; margin-left: auto; }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
  }
  .badge.NOERROR  { background: #14532d; color: var(--green); }
  .badge.NXDOMAIN { background: #7f1d1d; color: var(--red); }
  .badge.MISMATCH { background: #431407; color: var(--orange); }
  .badge.SERVFAIL { background: #451a03; color: var(--amber); }
  .badge.checking { background: #1c1917; color: var(--amber); }
  .badge.pending  { background: #1e293b; color: var(--grey); }

  .type-badge {
    background: #1e3a5f;
    color: #93c5fd;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .type-badge.CNAME { background: #1e1b4b; color: #a5b4fc; }

  .source-badge {
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: #1e293b;
    color: var(--grey);
  }
  .source-badge.traefik { background: #0e2a3a; color: #7dd3fc; }

  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  .instance-label {
    background: var(--border);
    color: var(--text-muted);
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty p { margin-top: 8px; font-size: 13px; }

  .refresh-time { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>docker-<span>ext-dns</span></h1>
  <span class="refresh-time" id="lastRefresh"></span>
  <div class="header-actions">
    <button onclick="refresh()">↻ Refresh</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <div class="toolbar">
    <select id="filterPlugin" onchange="applyFilters()">
      <option value="">All plugins</option>
    </select>
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="NOERROR">NOERROR</option>
      <option value="NXDOMAIN">NXDOMAIN</option>
      <option value="MISMATCH">MISMATCH</option>
      <option value="SERVFAIL">SERVFAIL</option>
      <option value="checking">Checking</option>
      <option value="pending">Pending</option>
    </select>
    <span class="count" id="recordCount"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Instance</th>
          <th>Container</th>
          <th>Plugin</th>
          <th>Hostname</th>
          <th>Type</th>
          <th>Value</th>
          <th>Source</th>
          <th>Last Updated</th>
          <th>DNS Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="emptyState">
      <div style="font-size:32px">🔍</div>
      <p id="emptyMsg">No records found.</p>
    </div>
  </div>
</main>

<script>
const FETCH_TIMEOUT = 8000;

let allRecords = [];
let instanceStatuses = {};
let activeTab = 'all';
let instances = [];   // populated on each refresh from server

const LOCAL = { name: 'local', proxied: false };

function fetchWithTimeout(url, timeout) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
}

async function loadInstances() {
  try {
    const r = await fetchWithTimeout('/api/instances', 3000);
    if (r.ok) {
      const remote = await r.json();
      instances = [LOCAL, ...remote];
      return;
    }
  } catch {}
  instances = [LOCAL];
}

function fetchRecords(inst) {
  if (!inst.proxied) {
    return fetchWithTimeout('/api/records', FETCH_TIMEOUT)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
  }
  return fetchWithTimeout(`/api/instances/${encodeURIComponent(inst.name)}/records`, FETCH_TIMEOUT)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
}

async function refresh() {
  await loadInstances();
  allRecords = [];
  instanceStatuses = {};

  const results = await Promise.allSettled(
    instances.map(inst =>
      fetchRecords(inst)
        .then(records => {
          instanceStatuses[inst.name] = 'ok';
          return records.map(rec => ({ ...rec, _instance: inst.name }));
        })
        .catch(err => {
          instanceStatuses[inst.name] = 'err';
          console.warn(`Instance '${inst.name}' unreachable:`, err.message);
          return [];
        })
    )
  );

  results.forEach(r => { if (r.status === 'fulfilled') allRecords.push(...r.value); });

  document.getElementById('lastRefresh').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  renderTabs();
  applyFilters();
  updatePluginFilter();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  tabs.appendChild(makeTab('all', 'All', null));
  instances.forEach(inst => {
    tabs.appendChild(makeTab(inst.name, inst.name, instanceStatuses[inst.name]));
  });
}

function makeTab(id, label, status) {
  const el = document.createElement('div');
  el.className = 'tab' + (activeTab === id ? ' active' : '');
  el.onclick = () => { activeTab = id; renderTabs(); applyFilters(); };
  const led = document.createElement('span');
  led.className = 'led' + (status === 'ok' ? ' ok' : status === 'err' ? ' err' : '');
  el.appendChild(led);
  el.append(label);
  return el;
}

function applyFilters() {
  const pluginFilter = document.getElementById('filterPlugin').value;
  const statusFilter = document.getElementById('filterStatus').value;
  let records = allRecords;
  if (activeTab !== 'all') records = records.filter(r => r._instance === activeTab);
  if (pluginFilter)  records = records.filter(r => r.plugin === pluginFilter);
  if (statusFilter)  records = records.filter(r => r.dns_status === statusFilter);
  renderTable(records);
  document.getElementById('recordCount').textContent =
    records.length + ' record' + (records.length !== 1 ? 's' : '');
}

function updatePluginFilter() {
  const plugins = [...new Set(allRecords.map(r => r.plugin))].sort();
  const sel = document.getElementById('filterPlugin');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All plugins</option>' +
    plugins.map(p => `<option value="${p}"${p===cur?' selected':''}>${p}</option>`).join('');
}

function renderTable(records) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('emptyState');
  const emptyMsg = document.getElementById('emptyMsg');
  if (records.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    emptyMsg.textContent = allRecords.length === 0
      ? 'No containers with ext-dns labels found.'
      : 'No records match the current filters.';
    return;
  }
  empty.classList.add('hidden');
  tbody.innerHTML = records.map(r => `
    <tr>
      <td><span class="instance-label">${esc(r._instance)}</span></td>
      <td>${esc(r.container_name)}</td>
      <td>${esc(r.plugin)}</td>
      <td class="mono">${esc(r.hostname)}</td>
      <td><span class="type-badge ${esc(r.record_type)}">${esc(r.record_type)}</span></td>
      <td class="mono">${esc(r.value)}</td>
      <td><span class="source-badge ${esc(r.source)}">${esc(r.source)}</span></td>
      <td style="color:var(--text-muted)">${fmtDate(r.last_updated)}</td>
      <td>${statusBadge(r.dns_status)}</td>
    </tr>
  `).join('');
}

function statusBadge(status) {
  const labels = {
    NOERROR: 'NOERROR', NXDOMAIN: 'NXDOMAIN',
    MISMATCH: 'MISMATCH', SERVFAIL: 'SERVFAIL',
    checking: 'Checking…', pending: 'Pending',
  };
  return `<span class="badge ${esc(status)}">${labels[status] || esc(status)}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
