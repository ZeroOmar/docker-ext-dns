<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>docker-ext-dns</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --orange: #f97316;
    --grey: #475569;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 span { color: var(--accent); }

  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: var(--border); }

  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }

  .tab {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    transition: color 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .led {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--grey); display: inline-block; flex-shrink: 0;
  }
  .tab .led.ok  { background: var(--green); }
  .tab .led.err { background: var(--red); }
  .tab .led.outdated { background: var(--amber); }

  main { padding: 20px; }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 13px;
  }

  .count { color: var(--text-muted); font-size: 13px; margin-left: auto; }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    text-align: left;
    padding: 8px 12px;
    color: var(--text-muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text); }
  th .arrow { opacity: 0; margin-left: 4px; font-size: 10px; }
  th.sorted .arrow { opacity: 1; }
  th.sorted { color: var(--text); }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* Grouped view collapses a hostname's records into one row; when a column
     holds several distinct values they are joined by this muted separator. */
  .cell-sep { color: var(--text-muted); opacity: 0.5; margin: 0 1px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
  }
  .badge.NOERROR  { background: #14532d; color: var(--green); }
  .badge.NXDOMAIN { background: #7f1d1d; color: var(--red); }
  .badge.MISMATCH { background: #431407; color: var(--orange); }
  .badge.SERVFAIL { background: #451a03; color: var(--amber); }
  .badge.checking { background: #1c1917; color: var(--amber); }
  .badge.pending  { background: #1e293b; color: var(--grey); }

  .type-badge {
    background: #1e3a5f;
    color: #93c5fd;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .type-badge.CNAME { background: #1e1b4b; color: #a5b4fc; }

  .source-badge {
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: #1e293b;
    color: var(--grey);
  }
  .source-badge.traefik { background: #0e2a3a; color: #7dd3fc; }

  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  .instance-label {
    background: var(--border);
    color: var(--text-muted);
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 11px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty p { margin-top: 8px; font-size: 13px; }
  .hidden { display: none !important; }

  .refresh-time { color: var(--text-muted); font-size: 12px; }
  a.refresh-time { text-decoration: none; transition: color 0.15s; }
  a.refresh-time:hover { color: var(--accent); }
  .refresh-time.outdated { color: var(--red); }
  a.refresh-time.outdated:hover { color: var(--red); text-decoration: underline; }
  .header-actions .divider {
    width: 1px;
    align-self: stretch;
    background: var(--border);
    margin: 2px 2px;
  }
</style>
</head>
<body>

<header>
  <h1><span>docker-ext-dns</span></h1>
  <div class="header-actions">
    <span class="refresh-time" id="lastRefresh"></span>
    <span class="divider"></span>
    <a class="refresh-time" id="appVersion" href="https://github.com/ZeroOmar/docker-ext-dns" target="_blank" rel="noopener"></a>
    <button onclick="refresh()">↻ Refresh</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<main>
  <div class="toolbar">
    <select id="filterPlugin" onchange="applyFilters()">
      <option value="">All plugins</option>
    </select>
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="NOERROR">NOERROR</option>
      <option value="NXDOMAIN">NXDOMAIN</option>
      <option value="MISMATCH">MISMATCH</option>
      <option value="SERVFAIL">SERVFAIL</option>
      <option value="checking">Checking</option>
      <option value="pending">Pending</option>
    </select>
    <span class="count" id="recordCount"></span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="headRow">
          <th data-key="_instance">Instance<span class="arrow"></span></th>
          <th data-key="container_name">Container<span class="arrow"></span></th>
          <th data-key="plugin">Plugin<span class="arrow"></span></th>
          <th data-key="hostname">Hostname<span class="arrow"></span></th>
          <th data-key="record_type">Type<span class="arrow"></span></th>
          <th data-key="value">Value<span class="arrow"></span></th>
          <th data-key="source">Source<span class="arrow"></span></th>
          <th data-key="last_updated">Last Updated<span class="arrow"></span></th>
          <th data-key="dns_status">DNS Status<span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="emptyState">
      <div style="font-size:32px">🔍</div>
      <p id="emptyMsg">No records found.</p>
    </div>
  </div>
</main>

<script>
const FETCH_TIMEOUT = 8000;

let allRecords = [];
let instanceStatuses = {};
let activeTab = 'all';
let instances = [];   // populated on each refresh from server
let sortKey = null;   // null = default order (instance, then container)
let sortDir = 1;      // 1 = ascending, -1 = descending

const LOCAL = { name: 'local', proxied: false };
const GITHUB_TAGS_URL = 'https://api.github.com/repos/ZeroOmar/docker-ext-dns/tags';
const VERSION_CHECK_INTERVAL = 6 * 60 * 60 * 1000;  // 6 hours

let currentVersion = null;          // running version of the local instance
let latestVersion = null;           // newest semver tag on GitHub, parsed
let instanceVersions = {};          // { instanceName: "x.y.z" }

function fetchWithTimeout(url, timeout) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
}

async function loadVersion() {
  try {
    const r = await fetchWithTimeout('/api/health', 3000);
    if (r.ok) {
      const { version } = await r.json();
      if (version) {
        currentVersion = version;
        document.getElementById('appVersion').textContent = 'v' + version;
        checkLatestVersion();
      }
    }
  } catch {}
}

// Parse "1.2.3" (or "v1.2.3") into [1, 2, 3]; returns null on garbage.
function parseSemver(v) {
  const m = String(v).trim().replace(/^v/i, '').match(/^(\d+)\.(\d+)\.(\d+)/);
  return m ? [+m[1], +m[2], +m[3]] : null;
}

// Returns 1 if a > b, -1 if a < b, 0 if equal.
function cmpSemver(a, b) {
  for (let i = 0; i < 3; i++) {
    if (a[i] !== b[i]) return a[i] > b[i] ? 1 : -1;
  }
  return 0;
}

// True if `version` (a "x.y.z" string) is older than the latest GitHub tag.
function isOutdated(version) {
  if (!latestVersion || !version) return false;
  const v = parseSemver(version);
  return v ? cmpSemver(latestVersion, v) > 0 : false;
}

async function checkLatestVersion() {
  try {
    const r = await fetchWithTimeout(GITHUB_TAGS_URL, 5000);
    if (!r.ok) return;
    const tags = await r.json();
    let latest = null;
    for (const t of tags) {
      const v = parseSemver(t.name);
      if (v && (!latest || cmpSemver(v, latest) > 0)) latest = v;
    }
    if (!latest) return;
    latestVersion = latest;
    updateVersionIndicator();
    renderTabs();  // re-color LEDs now that we know the latest version
  } catch {}
}

// Color the local version label red when an update is available.
function updateVersionIndicator() {
  const el = document.getElementById('appVersion');
  if (!currentVersion || !latestVersion) return;
  if (isOutdated(currentVersion)) {
    el.classList.add('outdated');
    el.title = `Update available: v${latestVersion.join('.')} (you have v${currentVersion})`;
  } else {
    el.classList.remove('outdated');
    el.title = 'Up to date';
  }
}

async function loadInstances() {
  try {
    const r = await fetchWithTimeout('/api/instances', 3000);
    if (r.ok) {
      const remote = await r.json();
      instances = [LOCAL, ...remote];
      return;
    }
  } catch {}
  instances = [LOCAL];
}

function fetchRecords(inst) {
  if (!inst.proxied) {
    return fetchWithTimeout('/api/records', FETCH_TIMEOUT)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
  }
  return fetchWithTimeout(`/api/instances/${encodeURIComponent(inst.name)}/records`, FETCH_TIMEOUT)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); });
}

// Best-effort: returns the instance's version string, or null if unavailable.
function fetchVersion(inst) {
  const url = inst.proxied
    ? `/api/instances/${encodeURIComponent(inst.name)}/health`
    : '/api/health';
  return fetchWithTimeout(url, 3000)
    .then(r => r.ok ? r.json() : null)
    .then(j => (j && j.version) ? j.version : null)
    .catch(() => null);
}

async function refresh() {
  await loadInstances();
  allRecords = [];
  instanceStatuses = {};

  const results = await Promise.allSettled(
    instances.map(inst =>
      fetchRecords(inst)
        .then(records => {
          instanceStatuses[inst.name] = 'ok';
          return records.map(rec => ({ ...rec, _instance: inst.name }));
        })
        .catch(err => {
          instanceStatuses[inst.name] = 'err';
          console.warn(`Instance '${inst.name}' unreachable:`, err.message);
          return [];
        })
    )
  );

  results.forEach(r => { if (r.status === 'fulfilled') allRecords.push(...r.value); });

  instanceVersions = {};
  await Promise.all(instances.map(inst =>
    fetchVersion(inst).then(v => { if (v) instanceVersions[inst.name] = v; })));

  document.getElementById('lastRefresh').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  renderTabs();
  applyFilters();
  updatePluginFilter();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  tabs.appendChild(makeTab('all', 'All', null, null));
  instances.forEach(inst => {
    tabs.appendChild(makeTab(
      inst.name, inst.name, instanceStatuses[inst.name], instanceVersions[inst.name]));
  });
}

function makeTab(id, label, status, version) {
  const el = document.createElement('div');
  el.className = 'tab' + (activeTab === id ? ' active' : '');
  el.onclick = () => { activeTab = id; renderTabs(); applyFilters(); };
  const led = document.createElement('span');
  // reachable + outdated → amber; reachable + current → green; unreachable → red.
  let ledState = '';
  if (status === 'ok') ledState = isOutdated(version) ? ' outdated' : ' ok';
  else if (status === 'err') ledState = ' err';
  led.className = 'led' + ledState;
  el.appendChild(led);
  el.append(label);
  if (version) {
    el.title = isOutdated(version)
      ? `v${version} — update available (latest v${latestVersion.join('.')})`
      : `v${version}`;
  }
  return el;
}

function applyFilters() {
  const pluginFilter = document.getElementById('filterPlugin').value;
  const statusFilter = document.getElementById('filterStatus').value;
  let records = allRecords;
  if (activeTab !== 'all') records = records.filter(r => r._instance === activeTab);
  if (pluginFilter)  records = records.filter(r => r.plugin === pluginFilter);
  if (statusFilter)  records = records.filter(r => r.dns_status === statusFilter);
  records = sortRecords(records);
  renderTable(records);
  document.getElementById('recordCount').textContent =
    records.length + ' record' + (records.length !== 1 ? 's' : '');
}

function cmp(a, b, key) {
  if (key === 'last_updated') {
    return new Date(a[key] || 0) - new Date(b[key] || 0);
  }
  return String(a[key] ?? '').localeCompare(
    String(b[key] ?? ''), undefined, { numeric: true, sensitivity: 'base' });
}

// Grouped (the default, and whenever Hostname is the sort column): rows are
// ordered by hostname so identical hostnames stay adjacent and collapse into a
// single row (each column showing its distinct values). Sorting by any other
// column switches to a flat global sort showing one record per row — click
// Hostname to regroup.
function isGrouped() {
  return sortKey === null || sortKey === 'hostname';
}

function sortRecords(records) {
  const recs = records.slice();
  if (isGrouped()) {
    const hostDir = sortKey === 'hostname' ? sortDir : 1;
    recs.sort((a, b) =>
      hostDir * cmp(a, b, 'hostname')
      || cmp(a, b, '_instance') || cmp(a, b, 'container_name'));
  } else {
    recs.sort((a, b) =>
      sortDir * cmp(a, b, sortKey)
      || cmp(a, b, '_instance') || cmp(a, b, 'container_name'));
  }
  return recs;
}

function setupSorting() {
  document.querySelectorAll('#headRow th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) {
        sortDir = -sortDir;
      } else {
        sortKey = key;
        sortDir = 1;
      }
      updateSortIndicators();
      applyFilters();
    });
  });
}

function updateSortIndicators() {
  document.querySelectorAll('#headRow th').forEach(th => {
    const arrow = th.querySelector('.arrow');
    if (th.dataset.key === sortKey) {
      th.classList.add('sorted');
      arrow.textContent = sortDir === 1 ? '▲' : '▼';
    } else {
      th.classList.remove('sorted');
      arrow.textContent = '';
    }
  });
}

function updatePluginFilter() {
  const plugins = [...new Set(allRecords.map(r => r.plugin))].sort();
  const sel = document.getElementById('filterPlugin');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All plugins</option>' +
    plugins.map(p => `<option value="${p}"${p===cur?' selected':''}>${p}</option>`).join('');
}

function renderTable(records) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('emptyState');
  const emptyMsg = document.getElementById('emptyMsg');
  if (records.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    emptyMsg.textContent = allRecords.length === 0
      ? 'No containers with ext-dns labels found.'
      : 'No records match the current filters.';
    return;
  }
  empty.classList.add('hidden');
  let html = '';
  if (isGrouped()) {
    // Collapse each hostname's records into one row, deduping per column.
    for (let i = 0; i < records.length; ) {
      const host = records[i].hostname;
      let j = i;
      while (j < records.length && records[j].hostname === host) j++;
      html += groupedRow(records.slice(i, j), host);
      i = j;
    }
  } else {
    for (const r of records) html += flatRow(r);
  }
  tbody.innerHTML = html;
}

// Distinct values of `field` across the group, preserving first-seen order.
function distinct(group, field) {
  return [...new Set(group.map(field))];
}

// Join distinct rendered fragments with a muted separator.
const CELL_SEP = ' <span class="cell-sep">-</span> ';
function joinCells(parts) { return parts.join(CELL_SEP); }

// A single record rendered as its own row (ungrouped / flat sort).
function flatRow(r) {
  return `
    <tr>
      <td><span class="instance-label">${esc(r._instance)}</span></td>
      <td>${esc(r.container_name)}</td>
      <td>${esc(r.plugin)}</td>
      <td class="mono">${esc(r.hostname)}</td>
      <td><span class="type-badge ${esc(r.record_type)}">${esc(r.record_type)}</span></td>
      <td class="mono">${esc(r.value)}</td>
      <td><span class="source-badge ${esc(r.source)}">${esc(r.source)}</span></td>
      <td style="color:var(--text-muted)">${fmtDate(r.last_updated)}</td>
      <td>${statusBadge(r.dns_status)}</td>
    </tr>`;
}

// All records sharing `host` collapsed into one row; each cell shows the
// distinct values for that column (a single value when they all match).
function groupedRow(group, host) {
  const instances = joinCells(distinct(group, r => r._instance)
    .map(v => `<span class="instance-label">${esc(v)}</span>`));
  const containers = joinCells(distinct(group, r => r.container_name).map(esc));
  const plugins = joinCells(distinct(group, r => r.plugin).map(esc));
  const types = joinCells(distinct(group, r => r.record_type)
    .map(v => `<span class="type-badge ${esc(v)}">${esc(v)}</span>`));
  const values = joinCells(distinct(group, r => r.value).map(esc));
  const sources = joinCells(distinct(group, r => r.source)
    .map(v => `<span class="source-badge ${esc(v)}">${esc(v)}</span>`));
  const updated = joinCells(distinct(group, r => fmtDate(r.last_updated)));
  const statuses = joinCells(distinct(group, r => r.dns_status).map(statusBadge));
  return `
    <tr>
      <td>${instances}</td>
      <td>${containers}</td>
      <td>${plugins}</td>
      <td class="mono">${esc(host)}</td>
      <td>${types}</td>
      <td class="mono">${values}</td>
      <td>${sources}</td>
      <td style="color:var(--text-muted)">${updated}</td>
      <td>${statuses}</td>
    </tr>`;
}

function statusBadge(status) {
  const labels = {
    NOERROR: 'NOERROR', NXDOMAIN: 'NXDOMAIN',
    MISMATCH: 'MISMATCH', SERVFAIL: 'SERVFAIL',
    checking: 'Checking…', pending: 'Pending',
  };
  return `<span class="badge ${esc(status)}">${labels[status] || esc(status)}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

setupSorting();
loadVersion();
refresh();
setInterval(refresh, 30000);
setInterval(checkLatestVersion, VERSION_CHECK_INTERVAL);
</script>
</body>
</html>
