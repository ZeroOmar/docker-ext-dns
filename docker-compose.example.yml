services:
  ext-dns:
    image: docker-ext-dns:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EXT_DNS_CONFIG: |
        interval: 30
        traefik:                   # provider-independent Traefik integration (applies to all providers)
          enabled: true            # default true; set false to disable globally
          hostname: traefik.lan    # optional; auto-discovered from a *traefik* container if omitted
        plugins:
          pihole:
            url: http://pihole:80
            password: your-pihole-password
          sophos-firewall:         # optional: manage Sophos Firewall (SFOS v22+) DNS host entries
            hostname: 10.0.0.1
            port: 4444
            username: ext-dns
            password: your-api-user-password
            insecure: true         # self-signed cert
            # traefik: false       # optional; disable Traefik integration for just this provider
            # min_os_major: 22     # optional; refuse to operate below this SFOS major version
            # ttl: 60              # optional; TTL for new A records
        web:
          port: 8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "999"   # docker group GID — adjust to match your host

  # Example managed container
  my-service:
    image: nginx:alpine
    labels:
      ext-dns.pihole.hostname: my-service.lan
      ext-dns.pihole.type: A
      # ext-dns.pihole.network: my_network   # optional: specify which network's IP to use

  # Example CNAME
  my-alias:
    image: nginx:alpine
    labels:
      ext-dns.pihole.hostname: alias.lan
      ext-dns.pihole.type: CNAME
      ext-dns.pihole.target: my-service.lan

  # Example record published to ALL configured providers via the reserved `all` key.
  # On providers without CNAME support (e.g. Sophos), CNAMEs are resolved to an A record.
  my-shared-service:
    image: nginx:alpine
    labels:
      ext-dns.all.hostname: shared.lan
      ext-dns.all.type: A

  # Example Traefik-routed service — a CNAME app.lan -> traefik.lan is created
  # automatically from the router rule (no ext-dns labels needed).
  my-traefik-app:
    image: nginx:alpine
    labels:
      traefik.http.routers.my-traefik-app.rule: Host(`app.lan`)
      # ext-dns.pihole.traefik: "false"   # opt this container out of Traefik integration
